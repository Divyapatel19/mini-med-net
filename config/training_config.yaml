# Training Configuration

training:
  # Dataset paths (relative to project root)
  data_dir: "data/chest_xrays"
  train_dir: "data/chest_xrays/train"
  val_dir: "data/chest_xrays/val"
  test_dir: "data/chest_xrays/test"

  # Output directories
  checkpoint_dir: "models"
  log_dir: "logs"
  results_dir: "outputs"

  # Hyperparameters
  epochs: 30
  batch_size: 32
  num_workers: 4           # DataLoader workers (set 0 on Windows if issues)
  pin_memory: true

  # Optimizer
  optimizer: "adam"
  learning_rate: 0.0001
  weight_decay: 0.0001

  # Scheduler
  scheduler: "reduce_on_plateau"
  scheduler_patience: 5
  scheduler_factor: 0.5
  min_lr: 0.000001

  # Early stopping
  early_stopping: true
  patience: 10
  monitor: "val_loss"

  # Class weighting (handles imbalance)
  use_class_weights: true
  pneumonia_weight: 1.0
  normal_weight: 1.5       # Normal class slightly up-weighted

  # Checkpoint saving
  save_best_only: true
  checkpoint_metric: "val_f1"

augmentation:
  # Training augmentation
  train:
    resize: 256
    center_crop: 224
    random_horizontal_flip: true
    random_rotation: 10    # degrees
    color_jitter:
      brightness: 0.2
      contrast: 0.2
      saturation: 0.1
    random_erasing: false
    normalize:
      mean: [0.485, 0.456, 0.406]   # ImageNet stats
      std: [0.229, 0.224, 0.225]

  # Validation/Test — no augmentation, only resize+crop+normalize
  val:
    resize: 256
    center_crop: 224
    normalize:
      mean: [0.485, 0.456, 0.406]
      std: [0.229, 0.224, 0.225]

logging:
  use_tensorboard: false
  log_every_n_steps: 10
  print_metrics_every_epoch: true
  save_plots: true
